<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  
  <script src='./webcc.min.js'></script> 
  <script src='./pdfkit.standalone.js'></script> 
  <script src='./blob-stream.js'></script> 
  <script src='./svg-to-pdfkit.min.js'></script>
  
  <style>
      html, body {
          height: 100%;
          width: 100%;
          margin: 0;
          padding: 0;
          overflow: hidden;
      }
      #myChartDiv {
          position: relative;
          height: 100vh;
          width: 100vw;
      }
  </style>
</head>

<body>

  <div id="myChartDiv">
    <canvas id="myChart"></canvas>
  </div>

  <script>
    //---
    let enblDbg = false;
    let docs = [];          // pool of doc objects
    let streams = [];       // pool of steams tied to doc objects
    let count = 0;          // progressive doc counter instances
    
    /* helper function ******************************************************/
    function uint8ToBase64(uint8Array) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
      let base64 = "";
      let i;
      const len = uint8Array.length;

      // Processa 3 byte alla volta per ottenere 4 caratteri Base64
      for (i = 0; i < len - 2; i += 3) {
        base64 += chars[uint8Array[i] >> 2];
        base64 += chars[((uint8Array[i] & 3) << 4) | (uint8Array[i + 1] >> 4)];
        base64 += chars[((uint8Array[i + 1] & 15) << 2) | (uint8Array[i + 2] >> 6)];
        base64 += chars[uint8Array[i + 2] & 63];
      }

      // Gestione del padding finale (=) se la lunghezza non � multiplo di 3
      if (i === len - 2) {
        base64 += chars[uint8Array[i] >> 2];
        base64 += chars[((uint8Array[i] & 3) << 4) | (uint8Array[i + 1] >> 4)];
        base64 += chars[(uint8Array[i + 1] & 15) << 2];
        base64 += "=";
      } else if (i === len - 1) {
        base64 += chars[uint8Array[i] >> 2];
        base64 += chars[(uint8Array[i] & 3) << 4];
        base64 += "==";
      }

      return base64;    
    }
    
    function uint8ToBase64(uint8Array) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
      let base64 = "";
      let i;
      const len = uint8Array.length;

      // Processa 3 byte alla volta per ottenere 4 caratteri Base64
      for (i = 0; i < len - 2; i += 3) {
        base64 += chars[uint8Array[i] >> 2];
        base64 += chars[((uint8Array[i] & 3) << 4) | (uint8Array[i + 1] >> 4)];
        base64 += chars[((uint8Array[i + 1] & 15) << 2) | (uint8Array[i + 2] >> 6)];
        base64 += chars[uint8Array[i + 2] & 63];
      }

      // Gestione del padding finale (=) se la lunghezza non � multiplo di 3
      if (i === len - 2) {
        base64 += chars[uint8Array[i] >> 2];
        base64 += chars[((uint8Array[i] & 3) << 4) | (uint8Array[i + 1] >> 4)];
        base64 += chars[(uint8Array[i + 1] & 15) << 2];
        base64 += "=";
      } else if (i === len - 1) {
        base64 += chars[uint8Array[i] >> 2];
        base64 += chars[(uint8Array[i] & 3) << 4];
        base64 += "==";
      }

      return base64;    
    }


    /* debug functions ******************************************************/

    // this is called in the code to log debug messages
    function dbglog(txt) {
      let tmp = txt+" || "+(new Date());
      WebCC.Events.fire("trace",tmp);
    }

    function newPDF(paper, orientation, margin) {
       if(enblDbg) dbglog("calling newPDF paper="+paper+" orientation="+orientation);
       try {
         const pdfOptions = {
           size:  paper,               // 'A4' o 'LETTER'
           layout: orientation,        // 'portrait' 'landscape'
           bufferPages: true,          // bufferizza le pagine per contarle
           ownerPassword: 'TH54321!',  // Password per le modifiche
           userPassword: '',           // Password per l'apertura
           permissions: {
             modifying: false,
             annotating: false,
             copying: true,
             printing: 'highResolution'
           },
           margin: margin,
           pdfVersion: '1.4' // Forza una versione compatibile con la crittografia standard
         };
         /* we use progressive numbering to identify objects, because this identifier
            will be passed to the outside of the custom control and we are unsure if an
            object would be correctly interpreted */
         let handle = ++count;
         let doc = new PDFDocument(pdfOptions);
         if(typeof doc.end !== 'function') {
           dbglog("errori ed orrori");
         }
         docs[handle] = doc;
         streams[handle] = doc.pipe(blobStream());
         if(enblDbg) dbglog("docs returned handle="+handle);
         return(handle);
       }
       catch(e) {
         dbglog("exception newPDF: "+e);
         throw e;
       }
    }

    function getPageSize(handle) {
      if(enblDbg) dbglog("calling getPageSize handle="+handle);
      try {
        let doc = docs[handle];
        let ret = { width: doc.page.width, height: doc.page.height}
        if(enblDbg) dbglog("getPageSize about to return "+JSON.stringify(ret));
        return(ret);
      }
      catch(e) {
         dbglog("exception getPageSize: "+e);
         throw e;
      }
    }

    function getTextSize(handle, text, w) {
      let opt;
      if(w !== undefined) {
        opt = {width: w};
      }
      let doc = docs[handle];
      let wret = doc.widthOfString(text);
      let hret = doc.heightOfString(text, opt);
      return({ width: wret, height: hret});
    }

    function setFont(handle, name) {
      if(enblDbg) dbglog("calling setFont handle="+handle+" name="+name);
      try {
        let doc = docs[handle];
        doc.font(name);
      }
      catch(e) {
         dbglog("exception setFont: "+e);
      }
    }

    function setFontSize(handle, size) {
      if(enblDbg) dbglog("calling setFontSize handle="+handle+" size="+size);
      try {
        let doc = docs[handle];
        doc.fontSize(size);
      }
      catch(e) {
         dbglog("exception setFontSize: "+e);
      }
    }

    function writeTextAt(handle,txt,x,y) {
      if(enblDbg) dbglog("calling writeTextAt handle="+handle+" text="+txt+" x="+x+" y="+y);
      try {
        let doc = docs[handle];
        doc.text(txt,x,y);
      }
      catch(e) {
         dbglog("exception writeTexAt: "+e);
      }
    }

    function writeTextAtWithFormat(handle,txt,x,y,w,al) {
      if(enblDbg) dbglog("calling writeTextAtWithFormat handle="+handle+" text="+txt+" x="+x+" y="+y+" w="+w+"a l="+al);
      try {
        let doc = docs[handle];
        doc.text(txt,x,y,{width:w,align:al});
      }
      catch(e) {
         dbglog("exception writeTextAtWithFormat: "+e);
      }
    }

    function getSvgString(buf) {
      if (typeof buf === 'string' && (buf.indexOf('<svg') !== -1 || buf.indexOf('<?xml') !== -1 || buf.indexOf('data:image/svg+xml') !== -1)) {
        let svgString = buf;
        if (buf.indexOf('data:image/svg+xml') !== -1) {
          let commaIdx = buf.indexOf(',');
          if (commaIdx !== -1) {
            let dataPart = buf.substring(commaIdx + 1);
            if (buf.indexOf('base64') !== -1) {
              svgString = atob(dataPart);
            } else {
              svgString = decodeURIComponent(dataPart);
            }
          }
        }
        console.log("=== PDFKit RECEIVED SVG ===");
        console.log(svgString);
        return svgString;
      }
      return null;
    }

    function embedImageAt(handle,buf,x,y) {
      if(enblDbg) dbglog("calling embedImageAt handle="+handle+" x="+x+" y="+y);
      try {
        let doc = docs[handle];
        let svgStr = getSvgString(buf);
        if (svgStr) {
          SVGtoPDF(doc, svgStr, x, y);
        } else {
          doc.image(buf,x,y);
        }
      }
      catch(e) {
         dbglog("exception embedImageAt: "+e);
      }
    }

    function embedImageAtToFit(handle,buf,x,y,w,alh,alv) {
      if(enblDbg) dbglog("calling embedImageAtToFit handle="+handle+" x="+x+" y="+y+" w="+w+" alh="+alh+" alv="+alv);
      try {
        let doc = docs[handle];
        let svgStr = getSvgString(buf);
        if (svgStr) {
          let options = {};
          if (typeof w === 'number') {
            options.width = w;
          }
          SVGtoPDF(doc, svgStr, x, y, options);
        } else {
          doc.image(buf,x,y,{width: w, align: alh, valign: alv});
        }
      }
      catch(e) {
         dbglog("exception embedImageToFitAt: "+e);
      }
    }

    function embedChartImage(handle,base64,x,y,w,h) {
      if(enblDbg) dbglog("calling embedChartImage handle="+handle+" x="+x+" y="+y+" w="+w+" h="+h);
      try {
        let doc = docs[handle];
        let svgStr = getSvgString(base64);
        if (svgStr) {
          let options = {};
          if (typeof w === 'number') options.width = w;
          if (typeof h === 'number') options.height = h;
          SVGtoPDF(doc, svgStr, x, y, options);
        } else {
          let imgOpts = {};
          if (typeof w === 'number') imgOpts.width = w;
          if (typeof h === 'number') imgOpts.height = h;
          doc.image(base64, x, y, imgOpts);
        }
      }
      catch(e) {
        dbglog("exception embedChartImage: "+e);
      }
    }

    function getNumberOfPages(handle) {
      if(enblDbg) dbglog("calling getNumberOfPages handle="+handle);
      try {
        let doc = docs[handle];
        const range = doc.bufferedPageRange();
        return(range.count);
      }
      catch(e) {
         dbglog("exception getNumberOfPages: "+e);
      }
    }

    function switchToPage(handle, page) {
      if(enblDbg) dbglog("calling switchToPage handle="+handle+" page="+page);
      try {
        let doc = docs[handle];
        doc.switchToPage(page);
      }
      catch(e) {
         dbglog("exception switchToPage: "+e);
      }
    }

    function endPDFAndBase64(handle) {
      if (enblDbg) dbglog("calling endPDFAndBase64 handle="+handle);
     
      return new Promise((resolve, reject) => {
        // Register action to do at doc.end()
        let stream = streams[handle];
      
        stream.on('finish', () => {
          try {
            const blob = stream.toBlob();
            const reader = new FileReader();

            reader.onloadend = () => {
              const parts = reader.result.split(',');
              const base64 = parts[1]; // Prendiamo solo i dati, senza il prefisso data:...
              if (enblDbg) dbglog("resolving base64");
              resolve(base64);
            };

            reader.onerror = (err) => reject(err);
            reader.readAsDataURL(blob);
          }
          catch (e2) {
            reject(e2);
          }
        });

        // Add error handler for stream
        stream.on('error', (err) => reject(err));

        // Close the stream
        try {
          let doc = docs[handle];
          doc.end();
          // free object reference in arrays, keeping them compact
          docs[handle]    = undefined;
          streams[handle] = undefined;
        }
        catch (e) {
          dbglog("exception during doc.end: " + e);
          reject(e);
        }
      });
    }

    function addPage(handle, options) {
      let doc = docs[handle];
      doc.addPage(options);
    }

    function rectStroke(handle, x, y, w, h) {
      if(enblDbg) dbglog("calling rectStroke handle="+handle+" x="+x+" y="+y+" w="+w+" h="+h);
      try {
        let doc = docs[handle];
        doc.rect(x,y,w,h).stroke();
      }
      catch(e) {
        dbglog("exception rectStroke: "+e);
      }
    }

    function rectFill(handle, x, y, w, h) {
      if(enblDbg) dbglog("calling rectFill handle="+handle+" x="+x+" y="+y+" w="+w+" h="+h);
      try {
        let doc = docs[handle];
        doc.rect(x,y,w,h).fill();
      }
      catch(e) {
        dbglog("exception rectFill: "+e);
      }
    }

    function rectFillAndStroke(handle, x, y, w, h) {
      if(enblDbg) this.dbglog("calling rectFillAndStroke handle="+handle+" x="+x+" y="+y+" w="+w+" h="+h);
      try {
        let doc = docs[handle];
        doc.rect(x,y,w,h).fillAndStroke();
      }
      catch(e) {
        dbglog("exception rectFillAndStroke: "+e);
      }
    }

    function stroke(handle, color) {
      if(enblDbg) this.dbglog("calling stroke handle="+handle+" color="+color);
       try {
         let doc = docs[handle];
         doc.strokeColor(color);
       }
      catch(e) {
        dbglog("exception stroke: "+e);
      }
    }

    function fill(handle, color) {
      if(enblDbg) this.dbglog("calling fill handle="+handle+" color="+color);
      try {
        let doc = docs[handle];
        doc.fillColor(color);
      }
      catch(e) {
        dbglog("exception fill: "+e);
      }
    }

    function drawLine(handle, x1, y1, x2, y2, thickness, color){
      if(enblDbg) this.dbglog("calling drawLine handle="+handle+" ("+x1+","+y1+")("+x2+","+y2+") thickness="+thickness+" color="+color);
      try {
        let doc = docs[handle];
        doc.moveTo(x1,y1).lineTo(x2,y2).lineWidth(thickness).stroke(color);
      }
      catch(e) {
        dbglog("exception drawLine: "+e);
      }
    }

    function batchPDF(handle, list) {
      if(enblDbg) this.dbglog("calling batchPDF handle="+handle+" on "+list.length+" commands");
      try {
        for(let i=0;i<list.length;i++) {
          let args = list[i];
          switch(args.cmd) {
            case "SetFont":
              setFont(handle, args.name);
              break;
            case "SetFontSize":
              setFontSize(handle, args.size);
              break;
            case "WriteTextAt":
              writeTextAt(handle, args.text,args.x,args.y);
              break;
            case "WriteTextAtWithFormat":
              writeTextAtWithFormat(handle, args.text,args.x,args.y,args.w,args.al);
              break;
            case "EmbedImageAt":
              embedImageAt(handle, args.buffer,args.x,args.y);
              break;
            case "EmbedImageAtToFit":
              embedImageAtToFit(handle, args.buffer,args.x,args.y,args.w,args.alh,args.alv);
              break;
              case "EmbedChartImage":
              embedChartImage(handle, args.base64, args.x, args.y, args.width, args.height);
              break;
            case "SwitchToPage":
              switchToPage(handle, args.page);
              break;
            case "AddPage":
              addPage(handle);
              break;
            case "RectStroke":
              rectStroke(handle, args.x, args.y, args.w, args.h);
              break;
            case "RectFill":
              rectFill(handle, args.x, args.y, args.w, args.h);
              break;
            case "RectFillAndStroke":
              rectFillAndStroke(handle, args.x, args.y, args.w, args.h);
              break;
            case "Stroke":
              stroke(handle, args.color);
              break;
            case "Fill":
              fill(handle, args.color);
              break;
            case "DrawLine":
              drawLine(handle, args.x1, args.y1, args.x2, args.y2, args.thickness, args.color);
              break;
          }
        }
      }
      catch(e) {
        dbglog("exception encode: "+e);
      }
    }
    
    function encode(text, encoding) {
      if(enblDbg) this.dbglog("calling encode text.length="+text.length+" as "+encoding);
      try {
        const encoder = new TextEncoder(encoding);
        let uint8 = encoder.encode(text);
        let base64 = uint8ToBase64(uint8);
        return(base64);
      }
      catch(e) {
        dbglog("exception encode: "+e);
      }
    }


    /* core functions *******************************************************/

    // this function sets dynamically dbglog, easier than attaching to property event...
    function setTraceMode(enable) {
        dbglog("SetTraceMode = "+enable);
        enblDbg = enable ? true : false;
    }

    
    /* WebCC ****************************************************************/

    WebCC.start(
      function(result) {
        if (result) {
          console.log("ChartJS Connected (v5)");
          try {             
          }
          catch(e) {
            console.error("Errore init Chart", e);
            dbglog("WebCC chart.js init exception "+e);
          }
        }
        else {
          console.log("WebCC Connection Failed");
          dbglog("WebCC chart.js Connection Failed");
        }
      },
      {
        methods: {
            SetTraceMode:          function(args) { setTraceMode(args.enable); },
            NewPDF:                function(args) { return newPDF(args.paper, args.orientation,args.margin); },
            GetPageSize:           function(args) { return getPageSize(args.handle); },
            GetTextSize:           function(args) { return getTextSize(args.handle, args.text, args.w); },
            SetFont:               function(args) { setFont(args.handle, args.name); },
            SetFontSize:           function(args) { setFontSize(args.handle, args.size); },
            WriteTextAt:           function(args) { writeTextAt(args.handle, args.text,args.x,args.y); },
            WriteTextAtWithFormat: function(args) { writeTextAtWithFormat(args.handle, args.text,args.x,args.y,args.w,args.al); },
            EmbedImageAt:          function(args) { embedImageAt(args.handle, args.buffer,args.x,args.y);  },
            EmbedImageAtToFit:     function(args) { embedImageAtToFit(args.handle, args.buffer,args.x,args.y,args.w,args.alh,args.alv);  },
            EmbedChartImage:       function(args) { embedChartImage(args.handle, args.base64, args.x, args.y, args.width, args.height); },
            SwitchToPage:          function(args) { switchToPage(args.handle, args.page); },
            GetNumberOfPages:      function(args) { return getNumberOfPages(args.handle); },
            EndPDFAndBase64:       function(args) { return endPDFAndBase64(args.handle); },
            AddPage:               function(args) { addPage(args.handle, args.orientation); },
            RectStroke:            function(args) { rectStroke(args.handle, args.x, args.y, args.w, args.h); },
            RectFill:              function(args) { rectFill(args.handle, args.x, args.y, args.w, args.h); },
            RectFillAndStroke:     function(args) { rectFillAndStroke(args.handle, args.x, args.y, args.w, args.h); },
            Stroke:                function(args) { stroke(args.handle, args.color); },
            Fill:                  function(args) { fill(args.handle, args.color); },
            DrawLine:              function(args) { drawLine(args.handle, args.x1, args.y1, args.x2, args.y2, args.thickness, args.color);},
            BatchPDF:              function(args) { batchPDF(args.handle, args.list); },
            Encode:                function(args) { return encode(args.text, args.encoding); }
        },
        events: ["trace"],
        properties: {
            EnableDebugLog: function(val) {
                enblDbg = val;
            }
        }
      }, [], 10000
    );
  </script>
</body>
</html>
