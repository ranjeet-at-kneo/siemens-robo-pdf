<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="./webcc.min.js"></script>
    <script src="./hammer.min.js"></script>
    <script src="./chart.min.js"></script>
    <script src="./chartjs-plugin-zoom.min.js"></script>

    <style>
     html,
body {
  height: 100%;
  width: 100%;
  margin: 0;
  padding: 0;
  overflow: auto;
}

body {
  display: flex;
  flex-direction: column;
}

#controls {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  background: #f5f5f5;
  border-bottom: 1px solid #ccc;
  font-family: Arial, sans-serif;
  font-size: 12px;
  flex-shrink: 0;
}

#controls select,
#controls input {
  height: 28px;
}

#myChartDiv {
  flex: 1;
  position: relative;
  width: 100%;
}

#myChart {
  width: 100% !important;
  height: 100% !important;
}
    </style>
  </head>

  <body>
   <div id="controls">

  <label>Paper</label>
  <select id="paperSize">
    <option value="A4">A4</option>
    <option value="A3">A3</option>
    <option value="LETTER">Letter</option>
  </select>

  <label>Orientation</label>
  <select id="orientation">
    <option value="auto">Auto</option>
    <option value="portrait">Portrait</option>
    <option value="landscape">Landscape</option>
  </select>

  <label>Width</label>
  <input
    type="number"
    id="exportWidth"
    value="1600"
    min="500"
    step="100"
  />

  <label>Height</label>
  <input
    type="number"
    id="exportHeight"
    value="900"
    min="300"
    step="100"
  />

  <span id="settingsInfo" style="margin-left:auto;color:#666;font-size:11px;"></span>

</div>

<div id="myChartDiv">
  <canvas id="myChart"></canvas>
</div>

    <script>
      let timeWindowMs = 30 * 60 * 1000;
      let timeExtensionMs = 5 * 60 * 1000;
      let currentLogicalMaxMs = timeWindowMs;
      let isManuallyZoomed = false;
      //Zoom Y--
      let currentZoomY = 1.0;
      let unzoomedYBounds = {};
      //---
      let enblDbg = false;

      let traces = [];
      let datasets = [];
      let chart = null;
      let lastChartBase64 = "";

      let axisLabels = {
        start: { text: "", visible: false },
        end: { text: "", visible: false },
      };

      let eventsList = [];
      let eventsMask = 0xffffffff;

      let eventColors = {
        1: "black",
        2: "red",
        4: "blue",
      };

      /* debug functions ******************************************************/

      // this is called in the code to log debug messages
      function dbglog(txt) {
        let tmp = txt + " | " + new Date();
        WebCC.Events.fire("trace", tmp);
      }

      /* plugins **************************************************************/

      const axisLabelPlugin = {
        id: "axisLabelDrawer",
        afterDraw(chart) {
          if (enblDbg) dbglog("axisLabelPlugin -> afterDraw");
          const ctx = chart.ctx;
          const { left, right, bottom } = chart.chartArea;
          const yPos = chart.scales.x.bottom + 15;

          ctx.save();
          ctx.font = "bold 12px Arial";
          ctx.fillStyle = "#333333";

          if (axisLabels.start.visible) {
            ctx.textAlign = "left";
            ctx.fillText(axisLabels.start.text, left, yPos);
          }

          if (axisLabels.end.visible) {
            ctx.textAlign = "right";
            ctx.fillText(axisLabels.end.text, right, yPos);
          }

          ctx.restore();
        },
      };

      const eventDrawerPlugin = {
        id: "eventDrawer",
        afterDatasetsDraw(chart, args, options) {
          if (enblDbg) dbglog("eventDrawerPlugin -> afterDatasetDraw");
          const ctx = chart.ctx;
          const xAxis = chart.scales.x;
          const yAxis =
            chart.scales[Object.keys(chart.scales).find((k) => k !== "x")];

          if (!xAxis || !yAxis) return;

          const minTime = xAxis.min;
          const maxTime = xAxis.max;
          const topY = chart.chartArea.top;
          const bottomY = chart.chartArea.bottom;

          ctx.save();
          ctx.textAlign = "left";
          ctx.textBaseline = "bottom";
          ctx.font = "12px Arial";

          eventsList.forEach((ev) => {
            if ((ev.type & eventsMask) === 0) return;
            if (ev.time < minTime || ev.time > maxTime) return;

            const xPos = xAxis.getPixelForValue(ev.time);
            let color = eventColors[ev.type] || "black";

            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 1;
            ctx.moveTo(xPos, topY);
            ctx.lineTo(xPos, bottomY);
            ctx.stroke();

            ctx.save();
            ctx.translate(xPos, topY + 10);
            ctx.rotate(Math.PI / 2);
            ctx.fillText(ev.text, 0, 0);
            ctx.restore();
          });

          ctx.restore();
        },
      };

      /* chart definition *****************************************************/

      var jsonCfg = {
        type: "line",
        data: { datasets: [] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          parsing: false,
          layout: {
            padding: { bottom: 20, left: 0, right: 0, top: 0 },
          },
          interaction: { mode: "nearest", axis: "x", intersect: false },
          plugins: {
            legend: {
              display: true,
              labels: {
                font: {
                  size: 20,
                },
                boxWidth: 14,
                boxHeight: 8,
              },
            },
            tooltip: {
              callbacks: {
                title: function (tooltipItems) {
                  if (!tooltipItems.length) return "";
                  let value = tooltipItems[0].parsed.x;
                  let totalSeconds = Math.floor(value / 1000);
                  let minutes = Math.floor(totalSeconds / 60);
                  let seconds = totalSeconds % 60;

                  return (
                    "Time: " +
                    (minutes < 10 ? "0" + minutes : minutes) +
                    ":" +
                    (seconds < 10 ? "0" + seconds : seconds)
                  );
                },
              },
            },
            zoom: {
              pan: {
                enabled: false,
                mode: "xy",
              },
              zoom: {
                wheel: { enabled: false },
                pinch: { enabled: false },
                mode: "xy",
              },
            },
            decimation: {
              enabled: false,
              algorithm: "lttb",
              samples: 800,
              threshold: 1000,
            },
          },
          elements: {
            point: { radius: 0 },
            line: { borderWidth: 1, tension: 0 },
          },
          scales: {
            x: {
              type: "linear",
              position: "bottom",
              min: 0,
              max: timeWindowMs,
              bounds: "ticks",
              ticks: {
                autoSkip: true,
                maxRotation: 0,
                callback: function (value) {
                  var totalSeconds = Math.floor(value / 1000);
                  var minutes = Math.floor(totalSeconds / 60);
                  var seconds = totalSeconds % 60;
                  return (
                    (minutes < 10 ? "0" + minutes : minutes) +
                    ":" +
                    (seconds < 10 ? "0" + seconds : seconds)
                  );
                },
              },
            },
          },
        },
        plugins: [eventDrawerPlugin, axisLabelPlugin],
      };

      /* core functions *******************************************************/

      // this function sets dynamically dbglog, easier than attaching to property event...
      function setTraceMode(enable) {
        WebCC.Events.fire("trace", "SetTraceMode = " + enable);
        enblDbg = enable ? true : false;
      }

      // this function toggles dynamically dbglog, easier than attaching to property event...
      function toggleTraceMode() {
        enblDbg = !enblDbg;
        WebCC.Events.fire("trace", "ToggleTraceMode = " + enblDbg);
      }

      // this function is called internally to get the max "t" of traces (meaning x)
      function getMaxTimeFromTraces() {
        let maxT = 0;

        try {
          traces.forEach((t) => {
            if (t._fullData && t._fullData.length > 0) {
              let lastPoint = t._fullData[t._fullData.length - 1];
              if (lastPoint.x > maxT) maxT = lastPoint.x;
            }
          });
          if (enblDbg) dbglog("getMaxTimeFromTraces returns maxT=" + maxT);
        } catch (e) {
          dbglog("getMaxTimeFromTraces exception: " + e);
        }
        return maxT;
      }

      // this function is called from outside after adding points to eventually prolong x axis
      function checkAndTimeAxisUpdate() {
        if (enblDbg) dbglog("calling checkAndTimeAxisUpdate");

        try {
          let safeWindow =
            typeof timeWindowMs !== "undefined" ? timeWindowMs : 1800000;
          let safeExtension =
            typeof timeExtensionMs !== "undefined" ? timeExtensionMs : 300000;

          if (!currentLogicalMaxMs || currentLogicalMaxMs < safeWindow) {
            currentLogicalMaxMs = safeWindow;
          }

          let currentMaxDataTime = getMaxTimeFromTraces();

          if (currentMaxDataTime > currentLogicalMaxMs) {
            let newMax = currentLogicalMaxMs + safeExtension;
            while (currentMaxDataTime > newMax) {
              newMax += safeExtension;
            }
            currentLogicalMaxMs = newMax;
          }

          if (enblDbg)
            dbglog(
              "checkAndTimeAxisUpdate got currentLogicalMaxMs=" +
                currentLogicalMaxMs,
            );

          // aggiorna la scala SOLO se NON zoom manuale
          if (chart && !isManuallyZoomed) {
            chart.options.scales.x.min = 0;
            chart.options.scales.x.max = currentLogicalMaxMs;
            updateDecimation(); //estrae i nuovi punti visibili dal _fullData
          }
        } catch (e) {
          dbglog("checkAndTimeAxisUpdate exception: " + e);
        }
      }

      // Decimazione Forzata ad hoc
      function updateDecimation() {
        try {
          if (!chart) return;
          const TARGET_POINTS = 1000;

          let viewMin = chart.options.scales.x.min;
          let viewMax = chart.options.scales.x.max;
          if (viewMin === undefined) viewMin = 0;
          if (viewMax === undefined) viewMax = currentLogicalMaxMs;

          chart.data.datasets.forEach((chartDataset, i) => {
            let sourceData = chartDataset._fullData;
            if (!sourceData || sourceData.length === 0) return;

            let startIndex = 0;
            let endIndex = sourceData.length;

            for (let k = 0; k < sourceData.length; k++) {
              if (sourceData[k].x >= viewMin) {
                startIndex = k;
                break;
              }
            }
            for (let k = startIndex; k < sourceData.length; k++) {
              if (sourceData[k].x > viewMax) {
                endIndex = k;
                break;
              }
            }
            if (startIndex > 0) startIndex--;
            if (endIndex < sourceData.length) endIndex++;

            let visibleCount = endIndex - startIndex;
            if (visibleCount < 0) visibleCount = 0;

            if (visibleCount <= TARGET_POINTS) {
              chartDataset.data = sourceData.slice(startIndex, endIndex);
            } else {
              let sampledData = [];
              let bucketCount = TARGET_POINTS / 2;
              let step = visibleCount / bucketCount;

              for (let j = 0; j < bucketCount; j++) {
                let bucketStartIdx = startIndex + Math.floor(j * step);
                let bucketEndIdx = startIndex + Math.floor((j + 1) * step);
                if (bucketEndIdx > endIndex) bucketEndIdx = endIndex;

                let minP = null,
                  maxP = null;

                for (let k = bucketStartIdx; k < bucketEndIdx; k++) {
                  let p = sourceData[k];
                  if (p.y === null || p.y === undefined || isNaN(p.y)) continue;
                  if (minP === null) {
                    minP = p;
                    maxP = p;
                  } else {
                    if (p.y < minP.y) minP = p;
                    if (p.y > maxP.y) maxP = p;
                  }
                }

                if (minP !== null) {
                  if (minP === maxP) sampledData.push(minP);
                  else {
                    if (minP.x < maxP.x) {
                      sampledData.push(minP);
                      sampledData.push(maxP);
                    } else {
                      sampledData.push(maxP);
                      sampledData.push(minP);
                    }
                  }
                } else {
                  if (sourceData[bucketStartIdx])
                    sampledData.push({
                      x: sourceData[bucketStartIdx].x,
                      y: Number.NaN,
                    });
                }
              }
              chartDataset.data = sampledData;
            }
          });
        } catch (e) {
          dbglog("updateDecimation exception: " + e);
        }
      }

      // this function is called from outside to allocate a trace
      function tracesAdd(colorRGB, yAxisId, lblName) {
        try {
          let newDataArray = [];
          let newTrace = {
            label: lblName,
            backgroundColor: colorRGB,
            borderColor: colorRGB,
            borderWidth: 3,
            fill: false,
            tension: 0,
            pointRadius: 0,
            data: newDataArray, // con la funzione di decimazione contiene solo i dati decimati
            _fullData: newDataArray, // contiene i dati originali, da cancellare se si rimuove la decimazione e rimettere "data" in tutte le altre ricorrenze
            yAxisID: yAxisId,
            normalized: true,
            parsing: false,
            spanGaps: false,
          };
          traces.push(newTrace);
          if (enblDbg)
            dbglog(
              "tracesAdd added trace " +
                (traces.length - 1) +
                " with name " +
                lblName,
            );
        } catch (e) {
          dbglog("tracesAdd exception: " + e);
        }
        return traces.length - 1;
      }

      // this function is called from outside in two different ways
      // 1. Set all traces in one single call, in which case it is
      //    called with append set to false and receives a list
      //    of traces where each element is an array of {x,y}
      //    traces          samples
      //     [ ]   --> [{x,y},{x,y},{x,y}]
      //     [ ]
      //     [ ]
      //     [ ]
      // 2. Add items to all traces in one single call, in which
      //    case it is called with append set to true and receives
      //    an array of samples where each element is an array with {x,y} for all traces
      //  samples     samples for all traces
      //    [ ]   --> [{x,y},{x,y},{x,y}]
      //    [ ]
      //    [ ]
      //    [ ]
      function tracesSetPoints(append, matrix) {
        try {
          if (enblDbg) dbglog("tracesSetPoints called with append=" + append);
          if (append) {
            // case 2
            if (enblDbg)
              dbglog(
                "tracesSetPoints adding " +
                  matrix.length +
                  " samples to all traces",
              );
            for (let i = 0; i < matrix.length; i++) {
              // each element contains an array of {x,y} as much as there are traces
              let tmp = matrix[i];
              if (enblDbg)
                dbglog(
                  "tracesSetPoints, adding sample" +
                    i +
                    " to " +
                    JSON.stringify(tmp),
                );

              for (let j = 0; j < tmp.length && j < traces.length; j++) {
                let tmpj = tmp[j];
                if (enblDbg)
                  dbglog(
                    "tracesSetPoints, sample " +
                      i +
                      " trace " +
                      j +
                      " added " +
                      JSON.stringify(tmpj[0]),
                  );
                traces[j]._fullData.push(tmpj[0]);
              }
              // dataset are already ok because they reference traces
            }
          } else {
            // case 1
            if (enblDbg)
              dbglog("tracesSetPoints adding " + matrix.length + " traces");
            for (let i = 0; i < matrix.length; i++) {
              // each element contains an array of {x,y} so we can directly replace traces
              traces[i]._fullData = matrix[i];
              // dataset are already ok because they reference traces
            }
          }
        } catch (e) {
          dbglog("tracesSetPoints exception: " + e);
        }
      }

      // this function is called from outside to add an axis Y
      function addAxisY(axisId, position, gridcolor) {
        if (enblDbg)
          dbglog("addAxisY axisId=" + axisId + " position=" + position);
        try {
          if (!jsonCfg.options.scales[axisId]) {
            jsonCfg.options.scales[axisId] = {
              type: "linear",
              display: true,
              position: position,
              grid: {
                color: gridcolor,
                display: true,
              },
            };
            if (chart) {
              chart.options.scales[axisId] = jsonCfg.options.scales[axisId];
              if (enblDbg)
                dbglog("addAxisY done " + chart.options.scales.length);
            }
          }
        } catch (e) {
          dbglog("addAxisY exception: " + e);
        }
      }

      // this function is called from outside to set the name and color of an Y axis
      function axisSetTitle(axisId, text, color) {
        try {
          let titleColor = color || "#666";
          let showTitle = text && text !== "";

          const applyTitle = (scaleObj) => {
            if (!scaleObj) return;

            scaleObj.title = {
              display: showTitle,
              text: text,
              color: titleColor,
              font: {
                size: 14,
                weight: "bold",
              },
              padding: { top: 4, bottom: 4 },
            };
          };

          if (jsonCfg.options.scales[axisId]) {
            applyTitle(jsonCfg.options.scales[axisId]);
          }

          if (chart && chart.options.scales[axisId]) {
            applyTitle(chart.options.scales[axisId]);
          }
        } catch (e) {
          dbglog("axisSetTitle exception: " + e);
        }
      }

      // this function is called from outside to set min and max of an Y axis
      function axisYMinMax(axisId, min, max) {
        try {
          const applyScale = (scaleObj) => {
            if (!scaleObj) return;

            if (isNaN(min) || min === null) delete scaleObj._origMin;
            else scaleObj._origMin = min;

            if (isNaN(max) || max === null) delete scaleObj._origMax;
            else scaleObj._origMax = max;
          };

          if (jsonCfg.options.scales[axisId])
            applyScale(jsonCfg.options.scales[axisId]);
          if (chart && chart.options.scales[axisId])
            applyScale(chart.options.scales[axisId]);
        } catch (e) {
          dbglog("axisYMinMax exception: " + e);
        }
      }

      // this function is called from outside to clear all Y axis defined
      function axisYClear() {
        try {
          Object.keys(jsonCfg.options.scales).forEach((key) => {
            if (key !== "x") delete jsonCfg.options.scales[key];
          });
          if (chart) {
            Object.keys(chart.options.scales).forEach((key) => {
              if (key !== "x") delete chart.options.scales[key];
            });
          }
        } catch (e) {
          dbglog("axisYClear exception: " + e);
        }
      }

      // this function is cslled from outside to make an Y axis visible or not
      function axisYVisible(axisId, visible) {
        try {
          if (jsonCfg.options.scales[axisId])
            jsonCfg.options.scales[axisId].display = visible;
          if (chart && chart.options.scales[axisId])
            chart.options.scales[axisId].display = visible;
        } catch (e) {
          dbglog("axisYVisible exception: " + e);
        }
      }

      // this function is called from outside to set a start date label
      function setLabelStart(text, visible) {
        try {
          axisLabels.start.text = text || "";
          axisLabels.start.visible =
            String(visible) === "true" || visible === true || visible === 1;
        } catch (e) {
          dbglog("setLabelStart exception: " + e);
        }
      }

      // this function is called from outside to set an end date label
      function setLabelEnd(text, visible) {
        try {
          axisLabels.end.text = text || "";
          axisLabels.end.visible =
            String(visible) === "true" || visible === true || visible === 1;
        } catch (e) {
          dbglog("setLabelEnd exception: " + e);
        }
      }

      // this function is called from outside to add an event
      function eventAdd(type, time, text) {
        try {
          if (time === undefined || time === null) return;
          eventsList.push({
            type: Number(type),
            time: Number(time),
            text: String(text || ""),
          });
        } catch (e) {
          dbglog("eventAdd exception: " + e);
        }
      }

      // this function is called from outside to clear all events
      function eventsClear() {
        eventsList = [];
      }

      // this function is called from outside to set mask of events to be shown
      function eventsMaskSet(mask) {
        if (mask === undefined || mask === null) return;
        eventsMask = Number(mask);
      }

      // this function is called from outside to set the color of an event
      function eventsColorSet(type, colorRGB) {
        if (!type || !colorRGB) return;
        eventColors[type] = colorRGB;
      }

      // this function is called from outside to clear all traces
      function tracesClear() {
        try {
          traces.forEach((t) => {
            t._fullData.length = 0; // svuota la memoria totale
            t.data.length = 0; // svuota la memoria visiva
          });
          currentLogicalMaxMs = timeWindowMs;
        } catch (e) {
          dbglog("tracesClear exception: " + e);
        }
      }

      // this function is called from outside to set the color of a trace
      function setTraceColor(index, colorRGB) {
        try {
          if (traces[index]) traces[index].borderColor = colorRGB;
        } catch (e) {
          dbglog("setTraceColor exception: " + e);
        }
      }

      // this function is called from outside to set the thickness of a trace
      function setTraceThickness(index, thickness) {
        try {
          if (traces[index]) traces[index].borderWidth = thickness;
        } catch (e) {
          dbglog("setTraceThickness exception: " + e);
        }
      }

      // this function is called from outside to add a dataset
      function datasetAdd(indexes) {
        if (enblDbg) dbglog("datasetAdd(" + indexes + ")");

        try {
          if (!Array.isArray(indexes)) return -1;
          let newGroup = [];
          for (let i = 0; i < indexes.length; i++) {
            if (traces[indexes[i]]) newGroup.push(traces[indexes[i]]);
          }
          datasets.push(newGroup);
          if (enblDbg) dbglog("datasetAdd done, total is " + datasets.length);
        } catch (e) {
          dbglog("datasetAdd exception: " + e);
        }
        return datasets.length - 1;
      }

      // this function is called from outside to overwrite a dataset definition
      function datasetSet(index, indexes) {
        if (enblDbg) dbglog("datasetSet index=" + index);

        try {
          if (index === undefined || index === null || index < 0) return;
          if (!Array.isArray(indexes)) return;

          let newGroup = [];
          for (let i = 0; i < indexes.length; i++) {
            if (traces[indexes[i]]) newGroup.push(traces[indexes[i]]);
          }

          let isCurrentlyVisible = false;
          if (
            chart &&
            datasets[index] &&
            chart.data.datasets === datasets[index]
          ) {
            isCurrentlyVisible = true;
          }

          datasets[index] = newGroup;

          if (isCurrentlyVisible) {
            jsonCfg.data.datasets = newGroup;
            chart.data.datasets = newGroup;
          }
        } catch (e) {
          dbglog("datasetSet exception: " + e);
        }
      }

      // this function is called from outside to show one of the registered dataset
      function datasetShow(index) {
        if (enblDbg) dbglog("datasetShow index=" + index);

        try {
          if (datasets[index]) {
            jsonCfg.data.datasets = datasets[index];

            // disable all y axes first
            Object.keys(jsonCfg.options.scales).forEach((key) => {
              if (key !== "x") jsonCfg.options.scales[key].display = false;
            });
            if (chart) {
              Object.keys(chart.options.scales).forEach((key) => {
                if (key !== "x") chart.options.scales[key].display = false;
              });
            }

            // list traces to determine which axes should be displayed
            let trcs = datasets[index];
            for (let i = 0; i < trcs.length; i++) {
              let trc = trcs[i];
              jsonCfg.options.scales[trc.yAxisID].display = true;
              if (chart) chart.options.scales[trc.yAxisID].display = true;
            }

            if (enblDbg)
              dbglog("datasetShow updated json datasets " + new Date());
            if (chart) {
              chart.data.datasets = datasets[index];
              if (enblDbg) dbglog("updated also json datasets " + new Date());
            }
          }
        } catch (e) {
          dbglog("datasetShow exception: " + e);
        }
      }

      // this function is called from outside to set a specific dataset
      function datasetClear() {
        datasets = [];
      }

      // this is called from the outside to force chart update
      function updateChart(none) {
        if (enblDbg) dbglog("UpdateChart start, whith none=" + none);
        updateDecimation(); // ricalcola i punti prima di disegnare
        try {
          if (none) {
            chart.update("none");
          } else {
            chart.update();
          }
          if (enblDbg) dbglog("UpdateChart done");
        } catch (e) {
          dbglog("updateChart exception: " + e);
        }
      }

      // factor > 1 avvicina la vista
      // factor < 1 allontana la vista
      function zoomX(factor) {
        if (enblDbg) dbglog("ZoomX chiamato con factor=" + factor);
        try {
          if (chart && factor) {
            isManuallyZoomed = true;
            if (typeof chart.zoom === "function") {
              chart.zoom({ x: factor }); //solo su x
            }
            clampXAxis(); // applica i limiti
            updateDecimation(); // ricalcola post-zoom
          }
        } catch (e) {
          dbglog("zoomX exception: " + e);
        }
      }

      function zoomY(factor) {
        if (enblDbg) dbglog("ZoomY chiamato con factor=" + factor);
        try {
          if (!chart || !factor) return;

          // se siamo al 100%, memorizza i limiti
          if (currentZoomY === 1.0) {
            Object.keys(chart.scales).forEach((id) => {
              if (id !== "x")
                unzoomedYBounds[id] = {
                  min: chart.scales[id].min,
                  max: chart.scales[id].max,
                };
            });
          }

          let newZoom = currentZoomY * factor;

          // 1. Limite ZOOM IN (Massimo 10x)
          if (newZoom > 10.0) {
            factor = 10.0 / currentZoomY;
            newZoom = 10.0;
          }

          // 2. Limite ZOOM OUT (Ritorno al 100%)
          if (newZoom <= 1.0) {
            currentZoomY = 1.0;
            Object.keys(chart.options.scales).forEach((axisId) => {
              if (axisId !== "x") {
                delete chart.options.scales[axisId].min;
                delete chart.options.scales[axisId].max;
              }
            });
            return;
          }

          // esegui lo zoom
          isManuallyZoomed = true;
          chart.zoom({ y: factor });
          currentZoomY = newZoom;

          applyYLimits();
        } catch (e) {
          dbglog("zoomY exception: " + e);
        }
      }

      // pixels > 0 sposta i dati verso destra
      // pixels < 0 sposta i dati verso sinistra
      function panX(pixels) {
        if (enblDbg) dbglog("PanX chiamato con pixels=" + pixels);
        try {
          if (chart && pixels) {
            isManuallyZoomed = true;
            if (typeof chart.pan === "function") {
              chart.pan({ x: pixels }, undefined, "default"); // solo su X
            }
            clampXAxis(); // applica i limiti
            updateDecimation(); // ricalcola post-pan
            chart.update("none"); // applica i nuovi dati
          }
        } catch (e) {
          dbglog("panX exception: " + e);
        }
      }

      // pixels > 0 sposta i dati verso il basso
      // pixels < 0 sposta i dati verso l'alto
      function panY(pixels) {
        if (enblDbg) dbglog("PanY chiamato con pixels=" + pixels);
        try {
          if (!chart || !pixels) return;

          // se 100% di zoom, no Pan.
          if (currentZoomY <= 1.0) return;

          isManuallyZoomed = true;
          chart.pan({ y: pixels }, undefined, "default");

          applyYLimits(); // applica i limiti
          chart.update("none"); // applica i nuovi dati
        } catch (e) {
          dbglog("panY exception: " + e);
        }
      }

      // ripristina zooom
      function resetZoom() {
        if (enblDbg) dbglog("ResetZoom chiamato");
        try {
          if (chart) {
            isManuallyZoomed = false;
            currentZoomY = 1.0; // ripristino scala y

            if (typeof chart.resetZoom === "function") chart.resetZoom();

            // Reset X
            chart.options.scales.x.min = 0;
            chart.options.scales.x.max = currentLogicalMaxMs;

            // Reset Y
            Object.keys(chart.options.scales).forEach((axisId) => {
              if (axisId !== "x") {
                delete chart.options.scales[axisId].min;
                delete chart.options.scales[axisId].max;
              }
            });

            updateDecimation();
            chart.update("none");
          }
        } catch (e) {
          dbglog("resetZoom exception: " + e);
        }
      }

      // limiti forzati per Pan e Zoom
      function clampXAxis() {
        if (!chart || !chart.scales.x) return;

        try {
          let min = chart.scales.x.min;
          let max = chart.scales.x.max;

          if (min === undefined) min = chart.options.scales.x.min;
          if (max === undefined) max = chart.options.scales.x.max;

          let range = max - min;

          // 1. Limite massimo di Zoom-In
          const MIN_ZOOM_RANGE = 30000; // 30 secondi in ms
          if (range < MIN_ZOOM_RANGE) {
            let center = (min + max) / 2;
            min = center - MIN_ZOOM_RANGE / 2;
            max = center + MIN_ZOOM_RANGE / 2;
            range = MIN_ZOOM_RANGE;
          }

          // 2. Limite massimo di Zoom-Out
          if (range >= currentLogicalMaxMs) {
            min = 0;
            max = currentLogicalMaxMs;
            range = currentLogicalMaxMs;
          }

          // 3. Limite Sinistro per il Pan
          if (min < 0) {
            min = 0;
            max = min + range;
          }

          // 4. limite Destro per il Pan
          let realMaxDataTime = getMaxTimeFromTraces();
          if (realMaxDataTime <= 0) realMaxDataTime = currentLogicalMaxMs;
          if (max > realMaxDataTime) {
            max = realMaxDataTime;
            min = max - range;

            if (min < 0) min = 0;
          }

          // applica i limiti corretti
          chart.options.scales.x.min = min;
          chart.options.scales.x.max = max;
        } catch (e) {
          dbglog("clampXAxis exception: " + e);
        }
      }

      // limiti Y
      function applyYLimits() {
        // cerca asse Y di riferimento
        try {
          let baseAxis = Object.keys(chart.options.scales).find(
            (k) => k !== "x" && chart.options.scales[k].display !== false,
          );
          if (!baseAxis || !unzoomedYBounds[baseAxis]) return;

          let optMin = chart.options.scales[baseAxis].min;
          let optMax = chart.options.scales[baseAxis].max;
          let unzoomed = unzoomedYBounds[baseAxis];

          if (optMin === undefined || optMax === undefined) return;

          let currentRange = optMax - optMin;
          let shiftRatio = 0;

          // se sceso sotto il minimo originale
          if (optMin < unzoomed.min) {
            shiftRatio = (unzoomed.min - optMin) / currentRange;
          }
          // se salito sopra il massimo originale
          else if (optMax > unzoomed.max) {
            shiftRatio = (unzoomed.max - optMax) / currentRange;
          }

          // se out, sposta tutti gli assi della stessa percentuale
          if (shiftRatio !== 0) {
            Object.keys(chart.options.scales).forEach((k) => {
              if (k === "x") return;
              let min = chart.options.scales[k].min;
              let max = chart.options.scales[k].max;
              if (min !== undefined && max !== undefined) {
                let range = max - min;
                chart.options.scales[k].min = min + range * shiftRatio;
                chart.options.scales[k].max = max + range * shiftRatio;
              }
            });
          }
        } catch (e) {
          dbglog("applyYLimits exception: " + e);
        }
      }

      /* =====================================================================
       * GetChartBase64 — captures current chart as small JPEG base64

function getExportSettings() {
    const paper = document.getElementById("paperSize")?.value || "A4";
    const orientation = document.getElementById("orientation")?.value || "auto";
    let width = parseInt(document.getElementById("exportWidth")?.value || "1600", 10);
    let height = parseInt(document.getElementById("exportHeight")?.value || "900", 10);
    if (isNaN(width) || width < 100) width = 1600;
    if (isNaN(height) || height < 100) height = 900;

    const settings = { paper, orientation, width, height };
    console.log("[ExportSettings]", JSON.stringify(settings));
    if (enblDbg) dbglog("getExportSettings: " + JSON.stringify(settings));
    return settings;
}

function logExportSettingsChange() {
    const s = getExportSettings();
    const info = document.getElementById("settingsInfo");
    if (info) info.textContent = s.paper + " | " + s.orientation + " | " + s.width + "x" + s.height;

    const chartDiv = document.getElementById("myChartDiv");
    if (chartDiv) {
        chartDiv.style.flex = "none";
        chartDiv.style.width = s.width + "px";
        chartDiv.style.height = s.height + "px";
        if (typeof chart !== "undefined" && chart) {
            chart.resize();
        }
    }
}

// Attach change listeners to update the info bar
document.addEventListener("DOMContentLoaded", function() {
    ["paperSize", "orientation", "exportWidth", "exportHeight"].forEach(function(id) {
        const el = document.getElementById(id);
        if (el) el.addEventListener("change", logExportSettingsChange);
        if (el) el.addEventListener("input", logExportSettingsChange);
    });
    logExportSettingsChange();
});

function escapeXml(value) {
    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&apos;");
}

function getChartSvgMarkup() {
    if (!chart) {
        throw new Error("No chart rendered");
    }

    const canvas = chart.canvas;
    const width = Math.max(400, Math.round(canvas.width || 1000));
    const height = Math.max(280, Math.round(canvas.height || 600));
    const chartArea = chart.chartArea || {};
    const left = chartArea.left || 44;
    const top = chartArea.top || 0;
    const right = chartArea.right || width - 24;
    const bottom = chartArea.bottom || height - 24;
    const plotTop = top;
    const plotLeft = left;
    const plotRight = right;
    const plotBottom = bottom;

    const body = [];
    body.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`);
    body.push(`<rect x="0" y="0" width="${width}" height="${height}" fill="#ffffff"/>`);

    // 1. Draw Axes, Ticks, Tick Labels, Grid Lines dynamically from scales
    if (chart.scales) {
        const visibleYScaleIds = Object.keys(chart.scales).filter(id => id !== 'x' && chart.scales[id].options.display !== false);
        const firstVisibleYScaleId = visibleYScaleIds.find(id => chart.scales[id].position === 'left') || visibleYScaleIds[0];

        Object.keys(chart.scales).forEach((scaleId) => {
            const scale = chart.scales[scaleId];
            if (!scale || scale.options.display === false) return;

            const isHorizontal = scale.isHorizontal();

            if (isHorizontal) {
                // Draw horizontal scale line
                const yPos = scale.bottom;
                body.push(`<line x1="${plotLeft}" y1="${yPos}" x2="${plotRight}" y2="${yPos}" stroke="#666666" stroke-width="1"/>`);

                if (scale.ticks) {
                    scale.ticks.forEach((tick, index) => {
                        const xPx = scale.getPixelForValue(tick.value);
                        if (xPx >= plotLeft - 0.5 && xPx <= plotRight + 0.5) {
                            // Vertical grid line (skip borders to avoid overlap)
                            if (xPx > plotLeft + 1 && xPx < plotRight - 1) {
                                body.push(`<line x1="${xPx.toFixed(2)}" y1="${plotTop}" x2="${xPx.toFixed(2)}" y2="${plotBottom}" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2,2"/>`);
                            }
                            // Tick mark line
                            body.push(`<line x1="${xPx.toFixed(2)}" y1="${yPos}" x2="${xPx.toFixed(2)}" y2="${yPos + 4}" stroke="#666666" stroke-width="1"/>`);
                            // Tick text
                            const label = tick.label || scale.getLabelForValue(tick.value);
                            if (label) {
                                body.push(`<text x="${xPx.toFixed(2)}" y="${yPos + 24}" font-family="Arial, sans-serif" font-size="22" fill="#4b5563" text-anchor="middle">${escapeXml(label)}</text>`);
                            }
                        }
                    });
                }

                // Axis Title (Horizontal scale)
                if (scale.options.title && scale.options.title.display && scale.options.title.text) {
                    const titleText = scale.options.title.text;
                    const titleColor = scale.options.title.color || "#666666";
                    const titleFontSize = Math.max(28, (scale.options.title.font?.size || 12) + 14);
                    const isBold = scale.options.title.font?.weight === "bold";
                    // Position below tick labels and custom labels
                    const titleY = Math.round(scale.bottom + (axisLabels.start.visible || axisLabels.end.visible ? 74 : 50));
                    const titleX = Math.round((plotLeft + plotRight) / 2);
                    body.push(`<text x="${titleX}" y="${titleY}" font-family="Arial, sans-serif" font-size="${titleFontSize}" font-weight="${isBold ? 'bold' : 'normal'}" fill="${titleColor}" text-anchor="middle">${escapeXml(titleText)}</text>`);
                }
            } else {
                // Vertical Y scale
                const isLeft = scale.position === "left";
                const xPos = isLeft ? scale.right : scale.left;

                // Draw vertical scale line
                body.push(`<line x1="${xPos}" y1="${plotTop}" x2="${xPos}" y2="${plotBottom}" stroke="#666666" stroke-width="1"/>`);

                if (scale.ticks) {
                    scale.ticks.forEach((tick, index) => {
                        const yPx = scale.getPixelForValue(tick.value);
                        if (yPx >= plotTop - 0.5 && yPx <= plotBottom + 0.5) {
                            // Horizontal grid line (only draw for the primary Y scale to avoid duplicate overlapping grids)
                            if (scaleId === firstVisibleYScaleId && scale.options.grid && scale.options.grid.display !== false) {
                                if (yPx > plotTop + 1 && yPx < plotBottom - 1) {
                                    const gridColor = scale.options.grid.color || "#e5e7eb";
                                    body.push(`<line x1="${plotLeft}" y1="${yPx.toFixed(2)}" x2="${plotRight}" y2="${yPx.toFixed(2)}" stroke="${gridColor}" stroke-width="1"/>`);
                                }
                            }
                            // Tick mark line
                            const xTickEnd = isLeft ? xPos - 4 : xPos + 4;
                            body.push(`<line x1="${xPos}" y1="${yPx.toFixed(2)}" x2="${xTickEnd}" y2="${yPx.toFixed(2)}" stroke="#666666" stroke-width="1"/>`);
                            // Tick text
                            const label = tick.label || scale.getLabelForValue(tick.value);
                            if (label) {
                                const textX = isLeft ? xPos - 14 : xPos + 14;
                                const anchor = isLeft ? "end" : "start";
                                body.push(`<text x="${textX}" y="${(yPx + 7.5).toFixed(2)}" font-family="Arial, sans-serif" font-size="22" fill="#4b5563" text-anchor="${anchor}">${escapeXml(label)}</text>`);
                            }
                        }
                    });
                }

                // Axis Title (Vertical Y scale)
                if (scale.options.title && scale.options.title.display && scale.options.title.text) {
                    const titleText = scale.options.title.text;
                    const titleColor = scale.options.title.color || "#666666";
                    const titleFontSize = Math.max(28, (scale.options.title.font?.size || 12) + 14);
                    const isBold = scale.options.title.font?.weight === "bold";
                    const titleX = isLeft 
                        ? Math.max(10, Math.round(scale.left + titleFontSize / 2)) 
                        : Math.min(width - 10, Math.round(scale.right - titleFontSize / 2));
                    const titleY = Math.round((plotTop + plotBottom) / 2);
                    const rotation = isLeft ? -90 : 90;
                    body.push(`<text x="0" y="0" font-family="Arial, sans-serif" font-size="${titleFontSize}" font-weight="${isBold ? 'bold' : 'normal'}" fill="${titleColor}" text-anchor="middle" transform="translate(${titleX}, ${titleY}) rotate(${rotation})">${escapeXml(titleText)}</text>`);
                }
            }
        });
    }

    // 2. Draw Events (matching eventDrawerPlugin logic)
    if (Array.isArray(eventsList)) {
        const xScale = chart.scales && chart.scales.x;
        const minTime = xScale ? xScale.min : 0;
        const maxTime = xScale ? xScale.max : currentLogicalMaxMs;

        eventsList.forEach((ev) => {
            if ((ev.type & eventsMask) === 0) return;
            if (ev.time < minTime || ev.time > maxTime) return;

            const xPos = xScale ? xScale.getPixelForValue(ev.time) : null;
            if (Number.isFinite(xPos) && xPos >= plotLeft && xPos <= plotRight) {
                const color = eventColors[ev.type] || "black";
                // Vertical line
                body.push(`<line x1="${xPos.toFixed(2)}" y1="${plotTop}" x2="${xPos.toFixed(2)}" y2="${plotBottom}" stroke="${color}" stroke-width="1"/>`);
                // Rotated event text
                const textY = plotTop + 10;
                body.push(`<text x="${xPos.toFixed(2)}" y="${textY}" font-family="Arial, sans-serif" font-size="10" fill="${color}" transform="rotate(90, ${xPos.toFixed(2)}, ${textY})">${escapeXml(ev.text)}</text>`);
            }
        });
    }

    // 3. Draw Legend (datasets labels)
    const datasets = Array.isArray(chart.data && chart.data.datasets) ? chart.data.datasets : [];
    const legendItems = [];

    if (chart.legend && Array.isArray(chart.legend.legendItems) && chart.legend.legendItems.length > 0) {
        chart.legend.legendItems.forEach((item) => {
            legendItems.push({
                text: item.text || "",
                color: item.strokeStyle || item.fillStyle || item.backgroundColor || "#3b82f6",
                lineWidth: item.lineWidth || 2,
                hidden: !!item.hidden,
            });
        });
    } else {
        datasets.forEach((dataset) => {
            if (!dataset) return;
            legendItems.push({
                text: dataset.label || "Series",
                color: dataset.borderColor || dataset.pointBorderColor || "#3b82f6",
                lineWidth: dataset.borderWidth || 2,
                hidden: false,
            });
        });
    }

    if (legendItems.length > 0) {
        const legendBox = chart.legend && Number.isFinite(chart.legend.left) && Number.isFinite(chart.legend.top)
            ? {
                left: chart.legend.left,
                top: chart.legend.top,
            }
            : null;
        const legendLineLength = 34;
        const configFontSize = chart.options.plugins.legend?.labels?.font?.size || 20;
        const legendFontSize = Math.max(configFontSize + 2, Math.round(Math.min(width, height) * 0.025));
        const rowGap = Math.max(20, Math.round(legendFontSize * 1.25));
        const maxLegendWidth = Math.max(220, Math.round(width * 0.65));
        const legendY = legendBox
            ? Math.max(12, Math.round(legendBox.top))
            : Math.max(20, Math.round(plotTop - 20));
        const legendCenterX = Math.round(width / 2);
        const legendX = legendBox
            ? Math.max(24, Math.round(legendCenterX - maxLegendWidth / 2))
            : Math.max(24, Math.round(width * 0.08));
        let cursorX = legendX;
        let cursorY = legendY;

        legendItems.forEach((item) => {
            if (!item.text) return;
            const swatchColor = item.hidden ? "#cccccc" : item.color;
            const label = escapeXml(item.text);
            const itemWidth = legendLineLength + 10 + label.length * (legendFontSize * 0.6);
            if (cursorX + itemWidth > legendX + maxLegendWidth && cursorX > legendX) {
                cursorX = legendX;
                cursorY += rowGap;
            }
            body.push(`<line x1="${cursorX}" y1="${cursorY + 8}" x2="${cursorX + legendLineLength}" y2="${cursorY + 8}" stroke="${swatchColor}" stroke-width="${Math.max(2, item.lineWidth || 2)}" stroke-linecap="round"/>`);
            body.push(`<text x="${cursorX + legendLineLength + 10}" y="${cursorY + 12}" font-family="Arial, sans-serif" font-size="${legendFontSize}" fill="#333333">${label}</text>`);
            cursorX += itemWidth + 12;
        });
    }

    // 4. Draw Custom Axis Labels (shifted slightly lower to avoid tick overlaps)
    if (axisLabels.start.visible) {
        body.push(`<text x="${left}" y="${bottom + 44}" font-family="Arial, sans-serif" font-size="22" fill="#333333">${escapeXml(axisLabels.start.text)}</text>`);
    }

    if (axisLabels.end.visible) {
        body.push(`<text x="${right}" y="${bottom + 44}" text-anchor="end" font-family="Arial, sans-serif" font-size="22" fill="#333333">${escapeXml(axisLabels.end.text)}</text>`);
    }

    // 5. Draw Data (Bars or Polylines)
    datasets.forEach((dataset, datasetIndex) => {
        if (!dataset || !Array.isArray(dataset.data)) return;

        const meta = chart.getDatasetMeta(datasetIndex);
        if (meta && meta.type === 'bar') {
            const metaData = meta.data || [];
            metaData.forEach((element) => {
                if (!element) return;
                
                // Get bar dimensions
                const x = element.x;
                const y = element.y;
                const base = element.base ?? y;
                const width = element.width ?? 10;
                
                const rectWidth = width;
                const rectHeight = Math.abs(y - base);
                const rectX = x - rectWidth / 2;
                const rectY = Math.min(y, base);

                const fill = element.options?.backgroundColor || dataset.backgroundColor || "#3b82f6";
                const stroke = element.options?.borderColor || dataset.borderColor || "none";
                const strokeWidth = element.options?.borderWidth || dataset.borderWidth || 0;

                body.push(`<rect x="${rectX.toFixed(2)}" y="${rectY.toFixed(2)}" width="${rectWidth.toFixed(2)}" height="${rectHeight.toFixed(2)}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}"/>`);
            });
            return;
        }

        // Default: Draw Polyline Data Points for line charts
        if (dataset.data.length < 2) return;
        const points = [];
        dataset.data.forEach((point, pointIndex) => {
            let xValue = null;
            let yValue = null;

            if (Array.isArray(point)) {
                xValue = point[0];
                yValue = point[1];
            } else if (point && typeof point === "object") {
                xValue = point.x ?? point.t ?? point[0];
                yValue = point.y ?? point.v ?? point[1];
            } else {
                xValue = pointIndex;
                yValue = point;
            }

            if (xValue === null || yValue === null || typeof xValue === "undefined" || typeof yValue === "undefined") {
                return;
            }

            const xScale = chart.scales && chart.scales.x;
            const yAxisId = dataset.yAxisID || "y";
            const scaleForY = chart.scales && chart.scales[yAxisId] ? chart.scales[yAxisId] : null;

            if (!xScale || !scaleForY) {
                return;
            }

            let xPx = xScale.getPixelForValue(xValue);
            let yPx = scaleForY.getPixelForValue(yValue);

            if (!Number.isFinite(xPx) || !Number.isFinite(yPx)) {
                return;
            }

            xPx = Math.max(plotLeft, Math.min(plotRight, xPx));
            yPx = Math.max(plotTop, Math.min(plotBottom, yPx));
            points.push(`${xPx.toFixed(2)},${yPx.toFixed(2)}`);
        });

        if (points.length >= 2) {
            const strokeColor = dataset.borderColor || dataset.pointBorderColor || "#3b82f6";
            const strokeWidth = dataset.borderWidth || 2;
            body.push(`<polyline fill="none" stroke="${strokeColor}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round" points="${points.join(" ")}"/>`);
        }
    });

    body.push("</svg>");
    return body.join("");
}

function getChartSvgDataUrl() {
    const svgMarkup = getChartSvgMarkup();
    return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgMarkup);
}

function getChartBase64() {
    if (!chart) {
        throw new Error("No chart rendered");
    }

    try {
        const settings = getExportSettings();
        const svgDataUrl = getChartSvgDataUrl();

        console.log(
            `[Export] paper=${settings.paper} orientation=${settings.orientation} svg length=${svgDataUrl.length}`
        );

        return svgDataUrl;
    }
    catch (err) {
        console.error("getChartBase64 error:", err);
        throw err;
    }
