<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Third-Party Libraries -->
    <script src="./lib/webcc.min.js"></script>
    <script src="./lib/hammer.min.js"></script>
    <script src="./lib/chart.min.js"></script>
    <script src="./lib/chartjs-plugin-zoom.min.js"></script>

    <!-- Modular Custom Scripts -->
    <script src="./chart-config.js"></script>
    <script src="./chart-operations.js"></script>
    <script src="./chart-data.js"></script>
    <script src="./svg-exporter.js"></script>
    <script src="./hmi-interface.js"></script>

    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div id="controls">
      <div class="control-group">
        <label for="paperSize">Paper</label>
        <select id="paperSize">
          <option value="A4">A4</option>
          <option value="A3">A3</option>
          <option value="LETTER">Letter</option>
        </select>
      </div>

      <div class="control-group">
        <label for="orientation">Orientation</label>
        <select id="orientation">
          <option value="auto">Auto</option>
          <option value="portrait">Portrait</option>
          <option value="landscape">Landscape</option>
        </select>
      </div>

      <div class="control-group">
        <label for="chartType">Type</label>
        <select id="chartType">
          <option value="line">Line</option>
          <option value="bar">Bar</option>
          <option value="mixed">Mixed</option>
        </select>
      </div>

      <div class="separator"></div>

      <div class="control-group">
        <label for="exportWidth">Width</label>
        <input type="number" id="exportWidth" value="1600" min="500" step="100" />
      </div>

      <div class="control-group">
        <label for="exportHeight">Height</label>
        <input type="number" id="exportHeight" value="900" min="300" step="100" />
      </div>

      <span id="settingsInfo"></span>
    </div>

    <div id="myChartDiv">
      <canvas id="myChart"></canvas>
    </div>

    <div id="brushContainer">
      <canvas id="brushCanvas"></canvas>
    </div>
  </body>
</html>
