<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Third-Party Libraries -->
    <script src="./lib/webcc.min.js"></script>
    <script src="./lib/hammer.min.js"></script>
    <script src="./lib/chart.min.js"></script>
    <script src="./lib/chartjs-plugin-zoom.min.js"></script>

    <!-- Modular Custom Scripts -->
    <script src="./chart-config.js"></script>
    <script src="./chart-operations.js"></script>
    <script src="./chart-data.js"></script>
    <script src="./svg-exporter.js"></script>
    <script src="./hmi-interface.js"></script>

    <style>
      html,
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: auto;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      #controls {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
        background: #f5f5f5;
        border-bottom: 1px solid #ccc;
        font-family: Arial, sans-serif;
        font-size: 12px;
        flex-shrink: 0;
      }

      #controls select,
      #controls input {
        height: 28px;
      }

      #myChartDiv {
        flex: 1;
        position: relative;
        width: 100%;
      }

      #myChart {
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>

  <body>
    <div id="controls">
      <label>Paper</label>
      <select id="paperSize">
        <option value="A4">A4</option>
        <option value="A3">A3</option>
        <option value="LETTER">Letter</option>
      </select>

      <label>Orientation</label>
      <select id="orientation">
        <option value="auto">Auto</option>
        <option value="portrait">Portrait</option>
        <option value="landscape">Landscape</option>
      </select>

      <label>Width</label>
      <input type="number" id="exportWidth" value="1600" min="500" step="100" />

      <label>Height</label>
      <input type="number" id="exportHeight" value="900" min="300" step="100" />

      <span id="settingsInfo" style="margin-left:auto;color:#666;font-size:11px;"></span>
    </div>

    <div id="myChartDiv">
      <canvas id="myChart"></canvas>
    </div>
  </body>
</html>
